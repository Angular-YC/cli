name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'

      - name: Detect releasable package changes
        id: changes
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          echo "Changed files between $BEFORE_SHA and $AFTER_SHA:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^packages/(angular-yc|runtime-yc)/(src/|package\.json|tsconfig\.json)'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip release for non-code changes
        if: steps.changes.outputs.should_release != 'true'
        run: echo "No releasable package code changes detected. Skipping publish/release."

      - name: Install dependencies
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        if: steps.changes.outputs.should_release == 'true'
        run: pnpm build

      - name: Configure npm for GitHub Packages
        if: steps.changes.outputs.should_release == 'true'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> "$NPM_CONFIG_USERCONFIG"
          echo "@angular-yc:registry=https://npm.pkg.github.com" >> "$NPM_CONFIG_USERCONFIG"
          echo "always-auth=true" >> "$NPM_CONFIG_USERCONFIG"

      - name: Determine next version
        if: steps.changes.outputs.should_release == 'true'
        id: version
        shell: bash
        run: |
          PACKAGE_NAME="@angular-yc/cli"
          LATEST_PUBLISHED="$(npm view "$PACKAGE_NAME" version --registry=https://npm.pkg.github.com 2>/dev/null || true)"
          PACKAGE_VERSION="$(node -p "require('./packages/angular-yc/package.json').version")"

          if [ -n "$LATEST_PUBLISHED" ]; then
            BASE_VERSION="$LATEST_PUBLISHED"
            if [[ ! "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Unsupported published version: $BASE_VERSION"
              exit 1
            fi
            NEXT_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
          else
            NEXT_VERSION="$PACKAGE_VERSION"
          fi

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Selected release version: $NEXT_VERSION"

      - name: Publish @angular-yc/cli
        if: steps.changes.outputs.should_release == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PACKAGE_NAME="@angular-yc/cli"
          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION already exists in GitHub Packages, skipping publish"
          else
            cd packages/angular-yc
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --access public
            cd ../..
          fi

      - name: Publish @angular-yc/runtime
        if: steps.changes.outputs.should_release == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PACKAGE_NAME="@angular-yc/runtime"
          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION already exists in GitHub Packages, skipping publish"
          else
            cd packages/runtime-yc
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --access public
            cd ../..
          fi

      - name: Create GitHub Release
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
          else
            {
              echo "## Release $VERSION"
              echo
              echo "### Packages Published"
              echo "- \`@angular-yc/cli@${{ steps.version.outputs.version }}\`"
              echo "- \`@angular-yc/runtime@${{ steps.version.outputs.version }}\`"
            } > release-notes.md
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --notes-file release-notes.md
          fi
